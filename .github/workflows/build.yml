name: Build Offline App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install
      - run: bun run build
      - name: Upload Zip File
        uses: actions/upload-artifact@v4
        with:
          name: Ank-Calculator-Offline
          path: dist/
