name: Build Offline App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: rm -f package-lock.json
      - run: npm install
      - run: npm run build
      - name: Upload Zip File
        uses: actions/upload-artifact@v4
        with:
          name: Ank-Calculator-Offline
          path: dist/
